spring.application.name=BookingService
server.port=5005

# ================= DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/salonbooking?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= DATABASE =================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ================= RABBITMQ =================
spring.rabbitmq.port=5672
spring.rabbitmq.host=localhost
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ================= EUREKA =================
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8070/eureka/

# ================= FEIGN =================
feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=5000

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.probes.enabled=true


# ================= RESILIENCE4J =================
# -------- USER --------
resilience4j.circuitbreaker.instances.userCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.userCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userCB.wait-duration-in-open-state=10s

resilience4j.retry.instances.userRetry.max-attempts=3
resilience4j.retry.instances.userRetry.wait-duration=2s

# -------- USER BY ID --------
resilience4j.circuitbreaker.instances.userByIdCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.userByIdCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userByIdCB.wait-duration-in-open-state=10s

resilience4j.retry.instances.userByIdRetry.max-attempts=3
resilience4j.retry.instances.userByIdRetry.wait-duration=2s

# -------- SALON BY ID --------
resilience4j.circuitbreaker.instances.salonByIdCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.salonByIdCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.salonByIdCB.wait-duration-in-open-state=10s

resilience4j.retry.instances.salonByIdRetry.max-attempts=3
resilience4j.retry.instances.salonByIdRetry.wait-duration=2s

# -------- SALON OWNER --------
resilience4j.circuitbreaker.instances.salonOwnerCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.salonOwnerCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.salonOwnerCB.wait-duration-in-open-state=10s

resilience4j.retry.instances.salonOwnerRetry.max-attempts=3
resilience4j.retry.instances.salonOwnerRetry.wait-duration=2s

# -------- OFFERING --------
resilience4j.circuitbreaker.instances.offeringCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.offeringCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.offeringCB.wait-duration-in-open-state=10s

resilience4j.retry.instances.offeringRetry.max-attempts=3
resilience4j.retry.instances.offeringRetry.wait-duration=2s

# -------- PAYMENT --------
resilience4j.circuitbreaker.instances.paymentCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.paymentCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentCB.wait-duration-in-open-state=10s

resilience4j.retry.instances.paymentRetry.max-attempts=3
resilience4j.retry.instances.paymentRetry.wait-duration=2s

# ================= TIME LIMITER =================
resilience4j.timelimiter.instances.userCB.timeout-duration=3s
resilience4j.timelimiter.instances.userByIdCB.timeout-duration=3s
resilience4j.timelimiter.instances.salonByIdCB.timeout-duration=3s
resilience4j.timelimiter.instances.salonOwnerCB.timeout-duration=3s
resilience4j.timelimiter.instances.offeringCB.timeout-duration=3s
resilience4j.timelimiter.instances.paymentCB.timeout-duration=5s

# ================= LOGGING =================
logging.level.io.github.resilience4j=DEBUG

















