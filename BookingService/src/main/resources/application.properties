spring.application.name=BookingService
server.port=5005

# ================= DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/salonbooking?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= DATABASE =================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ================= RABBITMQ =================
spring.rabbitmq.port=5672
spring.rabbitmq.host=localhost
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ================= EUREKA =================
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8070/eureka/

# ================= FEIGN =================
feign.client.config.default.connect-timeout=3000
feign.client.config.default.read-timeout=5000

# ================= RETRY =================
resilience4j.retry.instances.defaultRetry.max-attempts=3
resilience4j.retry.instances.defaultRetry.wait-duration=500ms

# ================= CIRCUIT BREAKER =================
resilience4j.circuitbreaker.instances.defaultCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.defaultCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.defaultCB.waitDurationInOpenState=10s

# ================= TIMEOUT =================
resilience4j.timelimiter.instances.defaultCB.timeout-duration=2s


# ================= ACTUATOR =================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.probes.enabled=true
management.endpoint.metrics.enabled=true


