spring.application.name=NotificationService
server.port=5007

# ================= DATABASE =================
spring.datasource.url=jdbc:mysql://localhost:3306/salonbooking?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= DATABASE =================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ================= RABBITMQ =================
spring.rabbitmq.port=5672
spring.rabbitmq.host=localhost
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ================= EUREKA =================
eureka.client.service-url.defaultZone=http://localhost:8070/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.probes.enabled=true


# ================= RESILIENCE4J CIRCUIT BREAKER =================

# Booking Service Circuit Breaker
resilience4j.circuitbreaker.instances.bookingCB.register-health-indicator=true
resilience4j.circuitbreaker.instances.bookingCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.bookingCB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.bookingCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bookingCB.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.bookingCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.bookingCB.automatic-transition-from-open-to-half-open-enabled=true

# User Service Circuit Breaker
resilience4j.circuitbreaker.instances.userCB.register-health-indicator=true
resilience4j.circuitbreaker.instances.userCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.userCB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.userCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userCB.wait-duration-in-open-state=10s

# ================= RETRY =================

# Booking Retry
resilience4j.retry.instances.bookingRetry.max-attempts=3
resilience4j.retry.instances.bookingRetry.wait-duration=2s

# User Retry
resilience4j.retry.instances.userRetry.max-attempts=3
resilience4j.retry.instances.userRetry.wait-duration=2s

# ================= TIME LIMITER =================
# Prevent slow services from hanging
resilience4j.timelimiter.instances.bookingCB.timeout-duration=3s
resilience4j.timelimiter.instances.userCB.timeout-duration=3s

# ================= LOGGING =================
logging.level.io.github.resilience4j=DEBUG







