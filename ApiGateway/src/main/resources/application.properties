# ================= RESILIENCE4J =================
resilience4j.circuitbreaker.instances.userCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userCB.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.salonCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.salonCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.salonCB.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.categoryCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.categoryCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.categoryCB.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.offeringCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.offeringCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.offeringCB.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.bookingCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.bookingCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.bookingCB.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.paymentCB.slidingWindowSize=10
resilience4j.circuitbreaker.instances.paymentCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentCB.waitDurationInOpenState=10s

resilience4j.circuitbreaker.instances.notificationCB.slidingWindowSize=10
