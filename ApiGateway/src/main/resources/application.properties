spring.application.name=ApiGateway
server.port=5000

# ================= REDIS =================
spring.redis.host=localhost
spring.redis.port=6379

# ================= GLOBAL RATE LIMIT =================
spring.cloud.gateway.default-filters[0].name=RequestRateLimiter
spring.cloud.gateway.default-filters[0].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.default-filters[0].args.redis-rate-limiter.burstCapacity=20


# ================= USER SERVICE =================
spring.cloud.gateway.routes[0].id=UserService
spring.cloud.gateway.routes[0].uri=lb://UserService
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**,/api/users/**,/api/admin/users/**

spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=userCB
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/users

spring.cloud.gateway.routes[0].filters[1].name=Retry
spring.cloud.gateway.routes[0].filters[1].args.retries=2
spring.cloud.gateway.routes[0].filters[1].args.methods=GET,POST,PUT,DELETE
spring.cloud.gateway.routes[0].filters[1].args.statuses=BAD_GATEWAY,GATEWAY_TIMEOUT
spring.cloud.gateway.routes[0].filters[1].args.backoff.firstBackoff=50ms
spring.cloud.gateway.routes[0].filters[1].args.backoff.maxBackoff=500ms
spring.cloud.gateway.routes[0].filters[1].args.backoff.factor=2


# ================= BOOKING SERVICE =================
spring.cloud.gateway.routes[1].id=BookingService
spring.cloud.gateway.routes[1].uri=lb://BookingService
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/bookings/**



spring.cloud.gateway.routes[1].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[1].filters[0].args.name=bookingCB
spring.cloud.gateway.routes[1].filters[0].args.fallbackUri=forward:/fallback/bookings

spring.cloud.gateway.routes[1].filters[1].name=Retry
spring.cloud.gateway.routes[1].filters[1].args.retries=2
spring.cloud.gateway.routes[1].filters[1].args.methods=GET,POST,PUT,DELETE
spring.cloud.gateway.routes[1].filters[1].args.statuses=BAD_GATEWAY,GATEWAY_TIMEOUT
spring.cloud.gateway.routes[1].filters[1].args.backoff.firstBackoff=50ms
spring.cloud.gateway.routes[1].filters[1].args.backoff.maxBackoff=500ms
spring.cloud.gateway.routes[1].filters[1].args.backoff.factor=2


