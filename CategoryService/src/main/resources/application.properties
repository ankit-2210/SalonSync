spring.application.name=CategoryService
server.port=5003

spring.datasource.url=jdbc:mysql://localhost:3306/salonbooking?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ================= EUREKA =================
eureka.client.service-url.defaultZone=http://localhost:8070/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ================= ACTUATOR =================
management.endpoints.web.exposure.include=health,info,metrics,circuitbreakers
management.endpoint.health.show-details=always
management.health.probes.enabled=true



# -------- SALON BY ID --------
resilience4j.circuitbreaker.instances.salonByIdCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.salonByIdCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.salonByIdCB.wait-duration-in-open-state=10s

resilience4j.retry.instances.salonByIdRetry.max-attempts=3
resilience4j.retry.instances.salonByIdRetry.wait-duration=2s


# -------- SALON OWNER ID --------
resilience4j.circuitbreaker.instances.salonOwnerCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.salonOwnerCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.salonOwnerCB.wait-duration-in-open-state=10s

resilience4j.retry.instances.salonOwnerRetry.max-attempts=3
resilience4j.retry.instances.salonOwnerRetry.wait-duration=2s


# ================= TIME LIMITER =================
resilience4j.timelimiter.instances.salonByIdCB.timeout-duration=3s
resilience4j.timelimiter.instances.salonOwnerCB.timeout-duration=3s

# ================= LOGGING =================
logging.level.io.github.resilience4j=DEBUG


















